name: amkyaw_editor
description: "Alight Motion-style video editor app with timeline, effects, and real-time preview"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  provider: ^6.1.2
  equatable: ^2.0.5
  
  # Video/Media
  video_player: ^2.9.1
  
  # Storage & Data
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0
  
  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/ffmpeg/
